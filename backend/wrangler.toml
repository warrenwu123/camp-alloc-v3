# backend/wrangler.toml
name                = "camp-alloc-v4"
main                = "src/index.js"
compatibility_date  = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding       = "DB"
database_name = "campallocation"
database_id   = "83a648ba-9758-4001-abb1-7ec6e3d50ec6"

# Secrets — set via Cloudflare dashboard (Worker → Settings → Variables):
#   JWT_SECRET      — 32+ random chars for signing access tokens
#   FRONTEND_URL    — https://warrenwu123.github.io/camp-alloc-v3
#   EMAIL_FROM      — sender email (optional)
#   SENDGRID_KEY    — SendGrid API key (optional, skips email if missing)
