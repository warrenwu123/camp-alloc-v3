# .github/workflows/cleanup.yml
# Cleans up PR preview when a PR is closed or merged

name: 🧹 Cleanup PR Preview

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Remove preview for PR #${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages-previews branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages-previews
        continue-on-error: true   # branch may not exist yet

      - name: Remove preview folder
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "pr-${PR_NUMBER}" ]; then
            git rm -rf "pr-${PR_NUMBER}"
            git commit -m "chore: remove preview for PR #${PR_NUMBER}"
            git push origin gh-pages-previews
            echo "Preview folder pr-${PR_NUMBER} removed."
          else
            echo "No preview folder found for PR #${PR_NUMBER} — nothing to clean up."
          fi

      - name: Post cleanup comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED:    ${{ github.event.pull_request.merged }}
        with:
          script: |
            const pr     = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;

            const body = merged
              ? `## ✅ PR Merged — Preview Removed\n\nThis PR has been merged to \`main\` and the preview environment for PR #${pr} has been cleaned up.\n\nProduction is now being deployed → https://${owner}.github.io/${repo}/`
              : `## 🗑 PR Closed — Preview Removed\n\nThe preview environment for PR #${pr} has been cleaned up.`;

            // Update existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview Ready')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            }
