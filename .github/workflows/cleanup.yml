# .github/workflows/cleanup.yml
# Removes the preview folder from main when a PR is closed/merged

name: 🧹 Cleanup PR Preview

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Remove preview for PR #${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove preview folder
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -d "previews/pr-${PR_NUMBER}" ]; then
            git rm -rf "previews/pr-${PR_NUMBER}"
            # Remove previews/ dir entirely if now empty
            [ -z "$(ls -A previews/ 2>/dev/null)" ] && git rm -rf previews/ || true
            git commit -m "chore: remove preview for PR #${PR_NUMBER}"
            git push origin main
            echo "Removed previews/pr-${PR_NUMBER}"
          else
            echo "No preview folder found — nothing to clean"
          fi

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr     = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const url    = `https://${owner}.github.io/${repo}/`;

            const body = merged
              ? `## ✅ PR #${pr} Merged — Preview Removed\n\nProduction deploying → [${url}](${url})`
              : `## 🗑 PR #${pr} Closed — Preview Removed`;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: pr });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview Ready'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            }
