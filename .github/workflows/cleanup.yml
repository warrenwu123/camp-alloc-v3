# .github/workflows/cleanup.yml
# Cleans up the PR preview folder when a PR is closed or merged

name: 🧹 Cleanup PR Preview

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Remove preview for PR #${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove preview folder
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check branch exists before trying to clean
          if ! git ls-remote --exit-code --heads origin gh-pages-previews; then
            echo "gh-pages-previews branch does not exist — nothing to clean"
            exit 0
          fi

          git fetch origin gh-pages-previews
          git worktree add /tmp/previews-cleanup origin/gh-pages-previews -B gh-pages-previews

          cd /tmp/previews-cleanup

          if [ -d "pr-${PR_NUMBER}" ]; then
            git rm -rf "pr-${PR_NUMBER}"
            git commit -m "chore: remove preview PR #${PR_NUMBER}"
            git push origin gh-pages-previews
            echo "Removed pr-${PR_NUMBER}/"
          else
            echo "No preview folder for PR #${PR_NUMBER} — already clean"
          fi

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr     = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const base   = `https://${owner}.github.io/${repo}`;

            const body = merged
              ? [
                  `## ✅ PR #${pr} Merged — Preview Removed`,
                  ``,
                  `Production is now deploying → [${base}/](${base}/)`,
                ].join('\n')
              : `## 🗑 PR #${pr} Closed — Preview Removed`;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: pr });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview Ready'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            }
