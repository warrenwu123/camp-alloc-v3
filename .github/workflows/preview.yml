# .github/workflows/preview.yml
# Deploys a staging preview for every PR to GitHub Pages
# Preview URL: https://kmgcamp.github.io/camp-alloc-v2/pr-{number}/

name: 🔍 PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write        # push preview branch
  pull-requests: write   # post comment with preview URL

jobs:
  deploy-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout PR branch ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Build the preview site ─────────────────────────────────────────────
      # Injects the PR-specific WORKER_URL and sets a base path so all assets
      # resolve correctly under /camp-alloc-v2/pr-{number}/
      - name: Build preview site
        env:
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          WORKER_URL: ${{ secrets.STAGING_WORKER_URL || 'https://campbook2.alvinkc.workers.dev' }}
          REPO_NAME:  camp-alloc-v2
        run: |
          mkdir -p dist

          # Patch index.html:
          #   1. Replace WORKER_URL with staging worker (or same worker)
          #   2. Add <base> tag so relative paths work under /pr-N/ subdirectory
          sed \
            -e "s|WORKER_URL:  '[^']*'|WORKER_URL:  '${WORKER_URL}'|g" \
            -e "s|<head>|<head><base href=\"/${REPO_NAME}/pr-${PR_NUMBER}/\">|" \
            index.html > dist/index.html

          # Copy test suite too so it's accessible at /pr-N/test.html
          if [ -f test.html ]; then
            sed \
              -e "s|https://campbook2.alvinkc.workers.dev|${WORKER_URL}|g" \
              -e "s|<head>|<head><base href=\"/${REPO_NAME}/pr-${PR_NUMBER}/\">|" \
              test.html > dist/test.html
          fi

          # Emit a small preview-info banner injected into dist/index.html
          BANNER="<!-- PR Preview #${PR_NUMBER} | commit: ${{ github.event.pull_request.head.sha }} -->"
          sed -i "s|<!-- CampAlloc|${BANNER}\n<!-- CampAlloc|" dist/index.html || true

          echo "Preview build complete for PR #${PR_NUMBER}"
          ls -lh dist/

      # ── 3. Push to gh-pages-previews branch ───────────────────────────────────
      # We keep all previews inside one branch under subfolders: pr-{N}/
      - name: Deploy to GitHub Pages (preview)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create the previews branch
          git fetch origin gh-pages-previews 2>/dev/null || true
          git checkout --orphan gh-pages-previews-tmp

          # If the branch already exists, check it out properly
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages-previews; then
            git checkout -B gh-pages-previews origin/gh-pages-previews
          else
            git checkout --orphan gh-pages-previews
            git rm -rf . --quiet || true
            # Add a root index that lists available previews
            echo "<html><body><h2>CampAlloc PR Previews</h2><p>Visit /pr-N/ for a specific PR preview.</p></body></html>" > index.html
            git add index.html
            git commit -m "chore: init previews branch"
          fi

          # Copy this PR's build into pr-{N}/
          rm -rf "pr-${PR_NUMBER}"
          mkdir -p "pr-${PR_NUMBER}"
          cp dist/index.html "pr-${PR_NUMBER}/index.html"
          [ -f dist/test.html ] && cp dist/test.html "pr-${PR_NUMBER}/test.html"

          git add "pr-${PR_NUMBER}/"
          git commit -m "preview: deploy PR #${PR_NUMBER} @ ${{ github.event.pull_request.head.sha }}" || echo "Nothing to commit"
          git push origin gh-pages-previews

      # ── 4. Post comment on the PR ─────────────────────────────────────────────
      - name: Post preview URL comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const pr      = context.payload.pull_request.number;
            const sha     = context.payload.pull_request.head.sha.slice(0, 7);
            const repo    = context.repo.repo;
            const owner   = context.repo.owner;
            const baseUrl = `https://${owner}.github.io/${repo}`;
            const previewUrl = `${baseUrl}/pr-${pr}/`;
            const testUrl    = `${baseUrl}/pr-${pr}/test.html`;

            const body = [
              `## 🔍 Preview Ready`,
              ``,
              `| | Link |`,
              `|---|---|`,
              `| 🌐 **App preview** | [${previewUrl}](${previewUrl}) |`,
              `| ⚗ **Test suite**  | [${testUrl}](${testUrl}) |`,
              ``,
              `**Commit:** \`${sha}\``,
              `**Branch:** \`${context.payload.pull_request.head.ref}\``,
              ``,
              `> Preview is served from the \`gh-pages-previews\` branch.`,
              `> It updates automatically on every new push to this PR.`,
              `> ⚠️ GitHub Pages can take 1–2 minutes to reflect new changes.`,
            ].join('\n');

            // Find existing bot comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview Ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
            }
