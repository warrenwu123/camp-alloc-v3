# .github/workflows/preview.yml
# Since GitHub Pages serves from main branch root,
# PR previews deploy to a separate gh-pages-previews branch
# which is configured as a second GitHub Pages site isn't possible
# on the same repo — so instead we use a /previews/ subfolder on main.
#
# Preview URL: https://kmgcamp.github.io/camp-alloc-v2/previews/pr-{N}/

name: 🔍 PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview (PR #${{ github.event.pull_request.number }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build preview HTML
        env:
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          WORKER_URL: ${{ secrets.STAGING_WORKER_URL || secrets.PRODUCTION_WORKER_URL || 'https://campbook2.alvinkc.workers.dev' }}
          REPO:       camp-alloc-v2
          OWNER:      ${{ github.repository_owner }}
        run: |
          mkdir -p /tmp/preview-build

          BASE="/camp-alloc-v2/previews/pr-${PR_NUMBER}/"

          patch_file() {
            sed \
              -e "s|WORKER_URL:  '[^']*'|WORKER_URL:  '${WORKER_URL}'|g" \
              -e "s|value=\"https://campbook2\.alvinkc\.workers\.dev\"|value=\"${WORKER_URL}\"|g" \
              -e "s|<head>|<head><base href=\"${BASE}\">|" \
              "$1" > "$2"
          }

          patch_file index.html /tmp/preview-build/index.html
          [ -f test.html ] && patch_file test.html /tmp/preview-build/test.html

          echo "Build done:"
          ls -lh /tmp/preview-build/

      - name: Checkout main and deploy preview folder
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA:       ${{ github.event.pull_request.head.sha }}
        run: |
          # Switch to main branch to write the preview folder
          git fetch origin main
          git checkout main

          mkdir -p "previews/pr-${PR_NUMBER}"
          cp /tmp/preview-build/index.html "previews/pr-${PR_NUMBER}/index.html"
          [ -f /tmp/preview-build/test.html ] && \
            cp /tmp/preview-build/test.html "previews/pr-${PR_NUMBER}/test.html"

          # Make sure .nojekyll exists
          touch .nojekyll

          git add "previews/pr-${PR_NUMBER}/" .nojekyll
          git diff --staged --quiet \
            && echo "No changes" \
            || git commit -m "preview: PR #${PR_NUMBER} @ ${SHA:0:7}"

          git push origin main

      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr    = context.payload.pull_request.number;
            const sha   = context.payload.pull_request.head.sha.slice(0, 7);
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const base  = `https://${owner}.github.io/${repo}`;

            const body = [
              `## 🔍 Preview Ready`,
              ``,
              `| | Link |`,
              `|---|---|`,
              `| 🌐 **App** | [${base}/previews/pr-${pr}/](${base}/previews/pr-${pr}/) |`,
              `| ⚗ **Tests** | [${base}/previews/pr-${pr}/test.html](${base}/previews/pr-${pr}/test.html) |`,
              ``,
              `**Commit:** \`${sha}\` · **Branch:** \`${context.payload.pull_request.head.ref}\``,
              ``,
              `> ⏱ Takes ~1 min to go live after each push.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Ready')
            );
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
            }
